<!DOCTYPE html>
<html>

</head>
<body>

<h1>🎉 आजचे वाढदिवस 🎉</h1>

{% if birthdays %}

    {% endfor %}
{% else %}
    <p>आज कोणाचाही वाढदिवस नाही 😔</p>
{% endif %}

<br>
<a href="/">🔙 परत जा</a>

</body>
</html>
