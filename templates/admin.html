<!DOCTYPE html>
<html>
<head>
<title>🎂 Birthday Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family:Poppins;
    background:#f4f6f9;
    padding:20px;
}

h2 {
    text-align:center;
}

/* Card */
.card {
    background:white;
    padding:20px;
    margin:15px auto;
    max-width:500px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3 {
    margin:0;
    color:#333;
}

.card p {
    margin:5px 0;
    color:#666;
}

/* Buttons */
.btn {
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin-right:10px;
}

.edit {
    background:#2196F3;
    color:white;
}

.wish {
    background:#25D366;
    color:white;
}

.logout {
    position:fixed;
    top:10px;
    right:10px;
}
</style>

</head>

<body>

<a href="/logout">
    <button class="btn logout">🚪 Logout</button>
</a>

<h2>🎂 आजचे वाढदिवस 🎉</h2>

{% if birthdays %}
    {% for p in birthdays %}
    <div class="card">
        <h3>👤 {{ p.name }}</h3>
        <p>📍 {{ p.village }}</p>
        <p>📞 {{ p.mobile }}</p>

        <br>

        <a href="/edit/{{ p.row_id }}">
            <button class="btn edit">✏️ Edit</button>
        </a>

        <a href="https://wa.me/91{{ p.mobile }}?text=🎉 वाढदिवसाच्या हार्दिक शुभेच्छा!">
            <button class="btn wish">🎉 शुभेच्छा द्या</button>
        </a>
    </div>
    {% endfor %}
{% else %}
    <h3 style="text-align:center;">आज कोणाचाही वाढदिवस नाही 😔</h3>
{% endif %}

</body>
</html>
