<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body {
    font-family:Poppins;
    background:#f4f6f9;
    text-align:center;
    padding-top:100px;
}

form {
    background:white;
    padding:30px;
    display:inline-block;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input {
    padding:10px;
    margin:10px;
    width:250px;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    padding:10px 20px;
    background:#ff5722;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

</head>

<body>

<h2>🔐 Admin Login</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>

    <button type="submit">Login</button>
</form>

</body>
</html>
