<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माहिती संकलन फॉर्म</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 450px; 
            background: #fff; 
            padding: 25px; 
            border-radius: 12px; 
            margin: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header img.logo { max-width: 80px; margin-bottom: 10px; }
        .header img.photo { width: 100%; border-radius: 8px; margin-top: 10px; }
        
        h2 { text-align: center; color: #2c3e50; font-size: 20px; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        
        label { font-weight: bold; display: block; margin-top: 15px; color: #444; }
        
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        
        input:focus, select:focus { border-color: #27ae60; outline: none; }
        
        button { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 25px; 
            transition: 0.3s;
        }
        button:hover { background-color: #219150; }
        
        .error-text { 
            color: #e74c3c; 
            font-size: 13px; 
            margin-top: 5px; 
            display: none; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="{{ url_for('static', filename='logo.png') }}" class="logo" onerror="this.style.display='none'">
            <img src="{{ url_for('static', filename='photo.jpg') }}" class="photo" onerror="this.style.display='none'">
        </div>
        
        <h2>माहिती संकलन फॉर्म</h2>
        
        <form action="/submit" method="post" id="dataForm" onsubmit="return validateForm()">
            <label>पूर्ण नाव</label>
            <input type="text" name="full_name" placeholder="तुमचे नाव लिहा" required>

            <label>जन्मतारीख (किमान १८ वर्षे)</label>
            <input type="date" name="dob" id="dob" required>
            <div id="age-error" class="error-text">तुमचे वय १८ वर्षांपेक्षा जास्त असणे आवश्यक आहे.</div>

            <label>मोबाईल नंबर</label>
            <input type="tel" name="mobile" id="mobile" placeholder="१० अंकी नंबर टाका" maxlength="10" required>
            <div id="mobile-error" class="error-text">कृपया १० अंकी वैध नंबर टाका.</div>

            <label>तालुका निवडा</label>
            <select name="taluka" id="taluka" onchange="updateVillages()" required>
                <option value="">निवडा</option>
                <option value="नांदगाव">नांदगाव</option>
                <option value="मालेगाव">मालेगाव</option>
            </select>

            <label>गाव निवडा</label>
            <select id="village" name="village" required>
                <option value="">निवडा</option>
            </select>

            <label>लिंग निवडा</label>
            <select name="gender" required>
                <option value="">निवडा</option>
                <option value="पुरुष">पुरुष</option>
                <option value="महिला">महिला</option>
                <option value="इतर">इतर</option>
            </select>

            <button type="submit">सबमिट करा</button>
        </form>
    </div>

    <script>
        // पायथन कडून येणारा डेटा
        const allVillages = {{ villages_data | tojson | safe }};

        function updateVillages() {
            const taluka = document.getElementById("taluka").value;
            const vSelect = document.getElementById("village");
            vSelect.innerHTML = '<option value="">निवडा</option>';

            if (taluka && allVillages[taluka]) {
                allVillages[taluka].forEach(v => {
                    const opt = document.createElement("option");
                    opt.value = v;
                    opt.textContent = v;
                    vSelect.appendChild(opt);
                });
            }
        }

        function validateForm() {
            // वय चेक
            const dob = document.getElementById("dob").value;
            if (dob) {
                const birthDate = new Date(dob);
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const month = today.getMonth() - birthDate.getMonth();
                if (month < 0 || (month === 0 && today.getDate() < birthDate.getDate())) {
                    age--;
                }
                
                if (age < 18) {
                    document.getElementById("age-error").style.display = "block";
                    return false;
                } else {
                    document.getElementById("age-error").style.display = "none";
                }
            }

            // मोबाईल नंबर चेक
            const mobile = document.getElementById("mobile").value;
            if (mobile.length !== 10 || !/^\d+$/.test(mobile)) {
                document.getElementById("mobile-error").style.display = "block";
                return false;
            } else {
                document.getElementById("mobile-error").style.display = "none";
            }

            return true;
        }

        // Mobile input - फक्त अंक घेणे
        document.getElementById("mobile").addEventListener("input", function(e) {
            this.value = this.value.replace(/[\D]/g, "");
        });
    </script>

</body>
</html>
