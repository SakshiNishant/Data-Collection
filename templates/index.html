<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माहिती संकलन फॉर्म</title>
    <style>
        /* मुख्य डिझाइन */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            max-width: 450px; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 15px; 
            margin: auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        /* हेडर (लोगो आणि फोटो) विभाग */
        .header { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .logo { 
            max-width: 100px; 
            height: auto; 
            margin-bottom: 10px;
        }
        .banner-photo { 
            width: 100%; 
            height: auto; 
            border-radius: 10px; 
            object-fit: cover;
            margin-top: 10px;
        }

        h2 { 
            text-align: center; 
            color: #1a73e8; 
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* इनपुट आणि ड्रॉपडाउन डिझाइन */
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #555;
        }
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        input:focus, select:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 5px rgba(26,115,232,0.2);
        }

        /* बटण डिझाइन */
        button { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover { 
            background-color: #1557b0; 
        }

        /* मोबाईलसाठी रिस्पॉन्सिव्ह */
        @media (max-width: 480px) {
            .container { padding: 15px; }
        }
    </style>
