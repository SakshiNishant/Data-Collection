<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माहिती संकलन</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .form-box { max-width: 400px; background: white; padding: 25px; border-radius: 12px; margin: auto; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        h2 { text-align: center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 25px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .err { color: red; font-size: 13px; display: none; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-box">
    <div class="header">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="max-width: 150px; height: auto;">
    </div>

    <h2>माहिती संकलन फॉर्म</h2>
    
    <form action="/submit" method="post" onsubmit="return checkForm()">
        <label>पूर्ण नाव</label>
        <input type="text" name="full_name" placeholder="तुमचे पूर्ण नाव" required>
        
        <label>जन्मतारीख</label>
        <input type="date" name="dob" required>
        
        <label>मोबाईल नंबर</label>
        <input type="tel" id="mobile" name="mobile" placeholder="१० अंकी नंबर" maxlength="10" required>
        <div id="m-err" class="err">कृपया १० अंकी वैध नंबर टाका.</div>

        <label>तालुका निवडा</label>
        <select id="taluka" name="taluka" onchange="loadVillages()" required>
            <option value="">निवडा</option>
            <option value="नांदगाव">नांदगाव</option>
            <option value="मालेगाव">मालेगाव</option>
        </select>

        <label>गाव निवडा</label>
        <select id="village" name="village" required>
            <option value="">आधी तालुका निवडा</option>
        </select>

        <label>लिंग</label>
        <select name="gender" required>
            <option value="">निवडा</option>
            <option value="पुरुष">पुरुष</option>
            <option value="महिला">महिला</option>
            <option value="इतर">इतर</option>
        </select>

        <label>व्यवसाय निवडा</label>
        <select name="occupation" required>
            <option value="">निवडा</option>
            <option value="शेतकरी">शेतकरी</option>
            <option value="मजूर">मजूर</option>
            <option value="व्यापार/व्यवसाय">व्यापार/व्यवसाय</option>
            <option value="विद्यार्थी">विद्यार्थी</option>
            <option value="नोकरी (शासकीय)">नोकरी (शासकीय)</option>
            <option value="नोकरी (खाजगी)">नोकरी (खाजगी)</option>
            <option value="गृहिणी">गृहिणी</option>
            <option value="इतर">इतर</option>
        </select>

        <button type="submit">माहिती जतन करा</button>
    </form>
</div>

<script>
    // पायथन (.txt फाईल्स) कडून येणारा गावांचा डेटा
    const allVillages = {{ villages_data | tojson | safe }};

    function loadVillages() {
        const taluka = document.getElementById("taluka").value;
        const vSelect = document.getElementById("village");
        vSelect.innerHTML = '<option value="">गाव निवडा</option>';

        if (taluka && allVillages[taluka]) {
            allVillages[taluka].forEach(v => {
                const opt = document.createElement("option");
                opt.value = v;
                opt.textContent = v;
                vSelect.appendChild(opt);
            });
        }
    }

    function checkForm() {
        const m = document.getElementById("mobile").value;
        const mPattern = /^[0-9]{10}$/;
        if (!mPattern.test(m)) {
            document.getElementById("m-err").style.display = "block";
            return false;
        }
        document.getElementById("m-err").style.display = "none";
        return true;
    }
</script>

</body>
</html>
