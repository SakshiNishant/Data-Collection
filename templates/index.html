<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माहिती संकलन</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .form-box { max-width: 400px; background: white; padding: 20px; border-radius: 10px; margin: auto; box-shadow: 0px 0px 10px gray; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; font-weight: bold; cursor: pointer; }
        .err { color: red; font-size: 12px; display: none; }
    </style>
</head>
<body>

<div class="form-box">
    <h2 style="text-align:center;">माहिती संकलन</h2>
    <form action="/submit" method="post" onsubmit="return checkForm()">
        <input type="text" name="full_name" placeholder="पूर्ण नाव" required>
        <input type="date" name="dob" required>
        
        <input type="tel" id="mobile" name="mobile" placeholder="मोबाईल नंबर (१० अंक)" maxlength="10" required>
        <div id="m-err" class="err">कृपया १० अंकी नंबर टाका.</div>

        <select id="taluka" name="taluka" onchange="loadVillages()" required>
            <option value="">तालुका निवडा</option>
            <option value="नांदगाव">नांदगाव</option>
            <option value="मालेगाव">मालेगाव</option>
        </select>

        <select id="village" name="village" required>
            <option value="">गाव निवडा</option>
        </select>

        <select name="gender" required>
            <option value="">लिंग निवडा</option>
            <option value="पुरुष">पुरुष</option>
            <option value="महिला">महिला</option>
        </select>

        <button type="submit">सबमिट करा</button>
    </form>
</div>

<script>
    // पायथन कडून येणारा डेटा
    const allVillages = {{ villages_data | tojson | safe }};

    function loadVillages() {
        const taluka = document.getElementById("taluka").value;
        const vSelect = document.getElementById("village");
        vSelect.innerHTML = '<option value="">गाव निवडा</option>';

        if (taluka && allVillages[taluka]) {
            allVillages[taluka].forEach(v => {
                const opt = document.createElement("option");
                opt.value = v;
                opt.textContent = v;
                vSelect.appendChild(opt);
            });
        }
    }

    function checkForm() {
        const m = document.getElementById("mobile").value;
        if (m.length !== 10) {
            document.getElementById("m-err").style.display = "block";
            return false;
        }
        return true;
    }
</script>

</body>
